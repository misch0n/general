<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Генерал</title>
<style>
  :root {
    --bg-0: #0b0e17;
    --bg-1: #121726;
    --surface: rgba(255, 255, 255, .045);
    --surface-2: rgba(255, 255, 255, .08);
    --stroke: rgba(255, 255, 255, .10);
    --stroke-strong: rgba(255, 255, 255, .22);
    --text: #eef1fb;
    --muted: #9aa3c4;
    --faint: #5b6488;
    --accent: #7aa2ff;          /* overridden per current player */
    --good: #4bd6a0;
    --danger: #ff7a8a;
    --radius: 16px;
    --shadow: 0 10px 40px rgba(0, 0, 0, .45);
    --font: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    font: 15px/1.5 var(--font);
    color: var(--text);
    background:
      radial-gradient(1000px 700px at 12% -8%, rgba(122,162,255,.18), transparent 55%),
      radial-gradient(900px 700px at 98% 0%, rgba(75,214,160,.12), transparent 50%),
      var(--bg-0);
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 { margin: 0; font-weight: 700; letter-spacing: -.01em; }
  button { font: inherit; color: inherit; cursor: pointer; border: 0; background: none; }
  .hidden { display: none !important; }
  .muted { color: var(--muted); }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 20px 70px; }

  .card {
    background: linear-gradient(180deg, var(--surface-2), var(--surface));
    border: 1px solid var(--stroke);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    backdrop-filter: blur(8px);
  }
  .btn {
    background: var(--surface-2); border: 1px solid var(--stroke);
    border-radius: 12px; padding: 10px 16px; transition: .15s; font-weight: 600;
  }
  .btn:hover { border-color: var(--stroke-strong); transform: translateY(-1px); }
  .btn.primary {
    background: linear-gradient(180deg, var(--accent), color-mix(in srgb, var(--accent) 78%, #000));
    border-color: transparent; color: #0a0e1c; box-shadow: 0 6px 20px rgba(122,162,255,.35);
  }
  .btn.primary:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; transform: none; }
  .btn.ghost { background: transparent; }

  /* ===================== SETUP ===================== */
  .setup { max-width: 640px; margin: 5vh auto 0; padding: 30px; }
  .brand { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
  .brand .logo { font-size: 40px; filter: drop-shadow(0 6px 14px rgba(122,162,255,.5)); }
  .brand h1 { font-size: 34px; }
  .sub { color: var(--muted); margin: 2px 0 24px; }

  .prow { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
  .prow input[type=color] {
    -webkit-appearance: none; appearance: none; width: 40px; height: 40px;
    border: 1px solid var(--stroke); border-radius: 11px; background: none; cursor: pointer; padding: 0;
  }
  .prow input[type=color]::-webkit-color-swatch { border: none; border-radius: 9px; }
  .prow input[type=color]::-webkit-color-swatch-wrapper { padding: 3px; }
  .prow .name {
    flex: 1; min-width: 0; font: inherit; color: inherit; background: rgba(0,0,0,.25);
    border: 1px solid var(--stroke); border-radius: 11px; padding: 10px 12px;
  }
  .prow .name:focus { outline: none; border-color: var(--accent); }
  .toggle { display: inline-flex; align-items: center; gap: 8px; user-select: none; cursor: pointer; font-size: 13px; color: var(--muted); }
  .switch { width: 42px; height: 24px; border-radius: 999px; background: rgba(255,255,255,.12); position: relative; transition: .18s; border: 1px solid var(--stroke); }
  .switch::after { content: ""; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: .18s; }
  .toggle.on .switch { background: var(--good); }
  .toggle.on .switch::after { transform: translateX(18px); }
  .toggle.on { color: var(--good); }
  .prow .del { width: 36px; height: 36px; border-radius: 10px; color: var(--muted); font-size: 18px; }
  .prow .del:hover { color: var(--danger); background: var(--surface-2); }
  .setup-actions { display: flex; gap: 12px; margin-top: 22px; flex-wrap: wrap; }
  .err { color: var(--danger); min-height: 20px; margin-top: 10px; font-size: 14px; }

  /* ===================== GAME ===================== */
  .game { display: grid; grid-template-columns: 1fr 300px; gap: 22px; align-items: start; }
  @media (max-width: 900px) { .game { grid-template-columns: 1fr; } }

  .topbar { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
  .turnchip {
    display: flex; align-items: center; gap: 11px; padding: 8px 16px 8px 10px;
    border-radius: 999px; background: var(--surface-2); border: 1px solid var(--stroke);
  }
  .avatar { width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; font-weight: 800; color: #0a0e1c; font-size: 14px; }
  .turnchip .nm { font-weight: 700; }
  .badge { font-size: 11px; font-weight: 800; letter-spacing: .06em; padding: 3px 8px; border-radius: 999px; background: rgba(122,162,255,.18); color: var(--accent); border: 1px solid rgba(122,162,255,.35); }
  .meta { color: var(--muted); font-size: 13px; }
  .rollpips { display: inline-flex; gap: 5px; vertical-align: middle; margin-left: 4px; }
  .rollpips i { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,.18); display: inline-block; }
  .rollpips i.live { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  /* dice stage */
  .stage { padding: 30px 20px 26px; text-align: center; margin-bottom: 22px; }
  .dice { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-bottom: 8px; }
  .die {
    --sz: 78px; width: var(--sz); height: var(--sz); border-radius: 18px;
    background: linear-gradient(155deg, #ffffff, #dfe4f5);
    box-shadow: 0 8px 18px rgba(0,0,0,.4), inset 0 2px 2px rgba(255,255,255,.9), inset 0 -6px 10px rgba(60,70,110,.25);
    padding: 12px; cursor: pointer; transition: transform .12s, box-shadow .15s;
    border: 3px solid transparent; position: relative;
  }
  .die .pips { width: 100%; height: 100%; display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr); gap: 2px; }
  .die .pip { border-radius: 50%; }
  .die .pip.on { background: radial-gradient(circle at 35% 30%, #4a5278, #1b2138); box-shadow: inset 0 1px 1px rgba(0,0,0,.5); align-self: center; justify-self: center; width: 72%; height: 72%; }
  .die.held { border-color: var(--accent); transform: translateY(-8px); box-shadow: 0 14px 26px rgba(0,0,0,.45), 0 0 0 4px color-mix(in srgb, var(--accent) 35%, transparent); }
  .die.held::after { content: "ЗАДЪРЖАН"; position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); font-size: 9px; letter-spacing: .08em; color: var(--accent); font-weight: 800; }
  .die.ghost { background: rgba(255,255,255,.05); box-shadow: inset 0 0 0 2px var(--stroke); cursor: default; }
  .die.ghost .q { width: 100%; height: 100%; display: grid; place-items: center; font-size: 30px; color: var(--faint); }
  .die.roll { animation: tumble .5s ease; }
  @keyframes tumble {
    0% { transform: translateY(0) rotate(0); }
    30% { transform: translateY(-16px) rotate(-110deg); }
    60% { transform: translateY(-6px) rotate(80deg); }
    100% { transform: translateY(0) rotate(0); }
  }
  .stage .hint { color: var(--muted); font-size: 13px; min-height: 18px; margin: 28px 0 18px; }
  .stage .controls { display: flex; gap: 12px; justify-content: center; align-items: center; }
  .thinking { color: var(--accent); font-weight: 700; display: inline-flex; align-items: center; gap: 8px; }
  .thinking .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:.25} 50%{opacity:1} }

  /* scoreboard */
  .board-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 560px) { .board-cols { grid-template-columns: 1fr; } }
  .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin: 2px 4px 10px; }
  .cat {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 12px;
    border: 1px solid transparent; margin-bottom: 6px; transition: .12s; min-height: 46px;
  }
  .cat .clabel { font-weight: 700; flex: 1; }
  .cat .cval { font-variant-numeric: tabular-nums; color: var(--faint); font-weight: 700; }
  .cat.filled { background: rgba(255,255,255,.03); }
  .cat.filled .cval { color: var(--text); }
  .cat.filled.zeroed .cval { color: var(--muted); }
  .cat.suggest { background: color-mix(in srgb, var(--accent) 12%, transparent); border-color: color-mix(in srgb, var(--accent) 45%, transparent); }
  .cat.sacrifice { opacity: .8; }
  .chip {
    font: inherit; font-weight: 800; font-variant-numeric: tabular-nums;
    padding: 6px 11px; border-radius: 10px; background: var(--surface-2);
    border: 1px solid var(--stroke); transition: .12s;
  }
  .cat.suggest .chip { background: var(--accent); color: #0a0e1c; border-color: transparent; }
  .chip:hover { transform: translateY(-1px); filter: brightness(1.07); }
  .chip.zero { background: transparent; color: var(--muted); border-style: dashed; }
  .totbar { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding: 14px 16px; border-radius: 12px; background: var(--surface-2); border: 1px solid var(--stroke); }
  .totbar b { font-size: 20px; }

  /* sidebar */
  .side .section-title { margin-left: 2px; }
  .plist { display: flex; flex-direction: column; gap: 9px; }
  .pcard { display: flex; align-items: center; gap: 11px; width: 100%; text-align: left; padding: 11px 12px; border-radius: 13px; border: 1px solid var(--stroke); background: var(--surface); transition: .14s; }
  .pcard:hover { border-color: var(--stroke-strong); }
  .pcard.current { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent); }
  .pcard .nm { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
  .pcard .tt { font-weight: 800; font-variant-numeric: tabular-nums; }
  .pcard .mini { font-size: 10px; font-weight: 800; color: var(--accent); }
  .side .note { font-size: 12px; color: var(--muted); margin-top: 12px; }

  /* modal */
  .overlay { position: fixed; inset: 0; background: rgba(5,7,14,.72); backdrop-filter: blur(4px); display: grid; place-items: center; padding: 20px; z-index: 30; }
  .modal { max-width: 440px; width: 100%; max-height: 88vh; overflow: auto; padding: 22px; }
  .modal .x { float: right; width: 34px; height: 34px; border-radius: 9px; color: var(--muted); font-size: 18px; }
  .modal .x:hover { background: var(--surface-2); }
  .winner { display: flex; align-items: center; gap: 12px; font-size: 22px; font-weight: 800; margin: 8px 0 18px; }
  .rank { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 12px; background: var(--surface); margin-bottom: 8px; border: 1px solid var(--stroke); }
  .rank .pos { width: 26px; font-weight: 800; color: var(--muted); }
  .rank.first { border-color: var(--good); }
  .rank .nm { flex: 1; font-weight: 600; }
  .rank .tt { font-weight: 800; font-variant-numeric: tabular-nums; }
  .peekrow { display: flex; justify-content: space-between; padding: 8px 10px; border-radius: 9px; }
  .peekrow:nth-child(odd) { background: rgba(255,255,255,.03); }
  .peekrow .pv { font-variant-numeric: tabular-nums; font-weight: 700; }
  .peekrow.empty .pv { color: var(--faint); }
</style>
</head>
<body>
<div class="wrap">

  <!-- ============ SETUP ============ -->
  <section id="setup" class="card setup">
    <div class="brand"><span class="logo">🎲</span><h1>Генерал</h1></div>
    <p class="sub">Български зарничен генерал. Добавете играчи, дайте им имена и цветове, включете AI противници — и започвайте.</p>
    <div id="playerList"></div>
    <div class="setup-actions">
      <button id="addPlayer" class="btn">+ Играч</button>
      <button id="startGame" class="btn primary">▶ Започни играта</button>
    </div>
    <div id="setupErr" class="err"></div>
  </section>

  <!-- ============ GAME ============ -->
  <section id="game" class="game hidden">
    <div class="main">
      <div class="topbar">
        <div class="turnchip">
          <span id="curAvatar" class="avatar"></span>
          <span id="curName" class="nm"></span>
          <span id="curAi" class="badge hidden">AI</span>
        </div>
        <span class="meta" id="roundMeta">Рунд 1</span>
        <span class="meta">Хвърляния <span id="rollPips" class="rollpips"></span></span>
      </div>

      <div class="card stage">
        <div id="dice" class="dice"></div>
        <p id="hint" class="hint"></p>
        <div class="controls">
          <button id="rollBtn" class="btn primary">🎲 Хвърли</button>
          <span id="thinking" class="thinking hidden"><span class="dot"></span>AI мисли…</span>
        </div>
      </div>

      <div class="card" style="padding:18px">
        <div class="board-cols">
          <div>
            <div class="section-title">Горна секция</div>
            <div id="boardUpper"></div>
          </div>
          <div>
            <div class="section-title">Долна секция</div>
            <div id="boardLower"></div>
          </div>
        </div>
        <div class="totbar"><span>Общо</span><b id="curTotal">0</b></div>
      </div>
    </div>

    <aside class="side">
      <div class="card" style="padding:16px">
        <div class="section-title">Играчи</div>
        <div id="plist" class="plist"></div>
        <p class="note">Натиснете играч, за да надникнете в дъската му.</p>
      </div>
    </aside>
  </section>
</div>

<!-- peek modal -->
<div id="peekModal" class="overlay hidden">
  <div class="card modal">
    <button class="x" id="peekClose">✕</button>
    <h2 id="peekTitle" style="margin-bottom:14px"></h2>
    <div id="peekBody"></div>
    <div class="totbar"><span>Общо</span><b id="peekTotal">0</b></div>
  </div>
</div>

<!-- game over modal -->
<div id="overModal" class="overlay hidden">
  <div class="card modal">
    <h2>🏆 Край на играта</h2>
    <div id="winner" class="winner"></div>
    <div id="ranks"></div>
    <div class="setup-actions"><button id="playAgain" class="btn primary">↻ Нова игра</button></div>
  </div>
</div>

<script src="game.js"></script>
<script>
(function () {
  'use strict';
  var G = window.General;
  var $ = function (id) { return document.getElementById(id); };

  var PIPS = { 1:[4], 2:[0,8], 3:[0,4,8], 4:[0,2,6,8], 5:[0,2,4,6,8], 6:[0,2,3,5,6,8] };
  var PRESET_COLORS = ['#7aa2ff', '#4bd6a0', '#ff9d5c', '#ec6aa6', '#b98bff', '#f2cb55', '#5fd0e0', '#ff7a8a'];
  var AI_DELAY = 700;

  function initials(name) {
    var parts = name.trim().split(/\s+/);
    return ((parts[0] || '?')[0] + (parts[parts.length - 1] || '')[0] || '?').toUpperCase();
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
    });
  }

  // ===================================================== SETUP
  var humanNames = G.nameGenerator('human');
  var aiNames = G.nameGenerator('ai');
  var setupPlayers = [];

  function addSetupPlayer(isAI) {
    var n = setupPlayers.length;
    setupPlayers.push({
      name: isAI ? aiNames() : humanNames(),
      color: PRESET_COLORS[n % PRESET_COLORS.length],
      isAI: !!isAI,
    });
    renderSetup();
  }

  function renderSetup() {
    var list = $('playerList');
    list.innerHTML = '';
    setupPlayers.forEach(function (p, i) {
      var row = document.createElement('div');
      row.className = 'prow';

      var color = document.createElement('input');
      color.type = 'color'; color.value = p.color;
      color.oninput = function () { p.color = color.value; };

      var name = document.createElement('input');
      name.type = 'text'; name.className = 'name'; name.value = p.name;
      name.placeholder = 'Име на играч';
      name.oninput = function () { p.name = name.value; };

      var toggle = document.createElement('button');
      toggle.className = 'toggle' + (p.isAI ? ' on' : '');
      toggle.title = 'Превключи между човек и AI';
      toggle.innerHTML = '<span class="switch"></span><span>AI</span>';
      toggle.onclick = function () {
        p.isAI = !p.isAI;
        // give the player a name fitting its new kind
        p.name = p.isAI ? aiNames() : humanNames();
        renderSetup();
      };

      var del = document.createElement('button');
      del.className = 'del'; del.textContent = '✕'; del.title = 'Премахни';
      del.onclick = function () { setupPlayers.splice(i, 1); renderSetup(); };

      row.appendChild(color);
      row.appendChild(name);
      row.appendChild(toggle);
      if (setupPlayers.length > 1) row.appendChild(del);
      list.appendChild(row);
    });
  }

  $('addPlayer').onclick = function () { addSetupPlayer(false); };
  $('startGame').onclick = function () {
    if (setupPlayers.some(function (p) { return !(p.name || '').trim(); })) {
      $('setupErr').textContent = 'Всеки играч трябва да има име.';
      return;
    }
    $('setupErr').textContent = '';
    startGame(setupPlayers.map(function (p) {
      return G.createPlayer(p.name.trim(), p.color, p.isAI);
    }));
  };

  addSetupPlayer(false);
  addSetupPlayer(false);

  // ===================================================== GAME STATE
  var game = null;
  var dice = [];
  var holds = [false, false, false, false, false];
  var rollsUsed = 0;
  var aiBusy = false;

  function startGame(players) {
    game = G.createGame(players);
    $('setup').classList.add('hidden');
    $('game').classList.remove('hidden');
    $('overModal').classList.add('hidden');
    beginTurn();
  }

  function beginTurn() {
    dice = [];
    holds = [false, false, false, false, false];
    rollsUsed = 0;
    var p = G.currentPlayer(game);
    document.documentElement.style.setProperty('--accent', p.color);
    renderAll();
    if (p.isAI) runAiTurn();
  }

  function rolling() { return rollsUsed > 0; }
  function rollsLeft() { return G.MAX_ROLLS - rollsUsed; }

  function doRoll() {
    dice = rollsUsed === 0 ? G.rollAll() : G.reroll(dice, holds, null);
    rollsUsed++;
    renderAll();
    animateDice();
  }

  $('rollBtn').onclick = function () {
    if (aiBusy || rollsLeft() <= 0) return;
    doRoll();
  };

  function animateDice() {
    $('dice').querySelectorAll('.die').forEach(function (el, i) {
      if (!holds[i]) { el.classList.remove('roll'); void el.offsetWidth; el.classList.add('roll'); }
    });
  }

  function toggleHold(i) {
    if (aiBusy || !rolling() || rollsLeft() <= 0) return;
    holds[i] = !holds[i];
    renderDice();
  }

  // ---- rendering ----
  function renderAll() { renderTop(); renderDice(); renderBoard(); renderSide(); }

  function renderTop() {
    var p = G.currentPlayer(game);
    var av = $('curAvatar');
    av.style.background = p.color; av.textContent = initials(p.name);
    $('curName').textContent = p.name;
    $('curAi').classList.toggle('hidden', !p.isAI);
    $('roundMeta').textContent = 'Рунд ' + game.round;

    var pips = '';
    for (var i = 0; i < G.MAX_ROLLS; i++) pips += '<i class="' + (i < rollsLeft() ? 'live' : '') + '"></i>';
    $('rollPips').innerHTML = pips;

    var btn = $('rollBtn');
    btn.disabled = aiBusy || rollsLeft() <= 0;
    btn.textContent = rollsUsed === 0 ? '🎲 Хвърли' : '🎲 Хвърли отново (' + rollsLeft() + ')';
    btn.classList.toggle('hidden', p.isAI);
    $('thinking').classList.toggle('hidden', !p.isAI || !aiBusy);

    $('hint').textContent = p.isAI ? ''
      : !rolling() ? 'Натиснете „Хвърли“, за да започнете хода си.'
      : rollsLeft() > 0 ? 'Натиснете зар, за да го задържите. Изберете предложение от дъската, за да точкувате.'
      : 'Няма повече хвърляния — изберете категория за точкуване.';
  }

  function dieEl(value, held, idx, interactive) {
    var el = document.createElement('div');
    if (value == null) {
      el.className = 'die ghost';
      el.innerHTML = '<div class="q">?</div>';
      return el;
    }
    el.className = 'die' + (held ? ' held' : '');
    var pips = '';
    for (var c = 0; c < 9; c++) pips += '<span class="pip' + (PIPS[value].indexOf(c) > -1 ? ' on' : '') + '"></span>';
    el.innerHTML = '<div class="pips">' + pips + '</div>';
    if (interactive) el.onclick = function () { toggleHold(idx); };
    else el.style.cursor = 'default';
    return el;
  }

  function renderDice() {
    var box = $('dice'); box.innerHTML = '';
    var p = G.currentPlayer(game);
    var interactive = !p.isAI && rolling() && rollsLeft() > 0;
    for (var i = 0; i < G.DICE_COUNT; i++) {
      box.appendChild(dieEl(rolling() ? dice[i] : null, holds[i], i, interactive));
    }
  }

  function renderBoard() {
    var p = G.currentPlayer(game);
    var canScore = !p.isAI && rolling();
    fillBoard('boardUpper', 'upper', p, canScore);
    fillBoard('boardLower', 'lower', p, canScore);
    $('curTotal').textContent = G.playerTotal(p);
  }

  function fillBoard(elId, group, player, canScore) {
    var host = $(elId); host.innerHTML = '';
    G.CATEGORIES.filter(function (c) { return c.group === group; }).forEach(function (c) {
      var row = document.createElement('div');
      var filled = G.isCategoryFilled(player, c.key);
      row.className = 'cat';

      var label = document.createElement('span');
      label.className = 'clabel'; label.textContent = c.label;
      row.appendChild(label);

      if (filled) {
        var v = player.scores[c.key];
        row.className += ' filled' + (v === 0 ? ' zeroed' : '');
        var val = document.createElement('span');
        val.className = 'cval'; val.textContent = v;
        row.appendChild(val);
      } else if (canScore) {
        var cands = G.candidates(c.key, dice);
        var best = Math.max.apply(null, cands);
        if (best > 0) {
          row.className += ' suggest';
          cands.forEach(function (v) {
            var chip = document.createElement('button');
            chip.className = 'chip'; chip.textContent = v;
            chip.onclick = function () { fillCategory(c.key, v); };
            row.appendChild(chip);
          });
        } else {
          row.className += ' sacrifice';
          var z = document.createElement('button');
          z.className = 'chip zero'; z.textContent = '0';
          z.title = 'Запиши 0 (изразходва категорията)';
          z.onclick = function () {
            if (confirm('Да запиша ли 0 в „' + c.label + '“? Това изразходва категорията.')) {
              fillCategory(c.key, 0);
            }
          };
          row.appendChild(z);
        }
      } else {
        var dash = document.createElement('span');
        dash.className = 'cval'; dash.textContent = '–';
        row.appendChild(dash);
      }
      host.appendChild(row);
    });
  }

  function fillCategory(key, value) {
    var p = G.currentPlayer(game);
    if (aiBusy || p.isAI || !rolling() || G.isCategoryFilled(p, key)) return;
    G.assignScore(p, key, dice, value);
    advance();
  }

  function advance() {
    if (G.isGameOver(game)) { showGameOver(); return; }
    G.nextTurn(game);
    beginTurn();
  }

  function renderSide() {
    var box = $('plist'); box.innerHTML = '';
    game.players.forEach(function (p, i) {
      var b = document.createElement('button');
      b.className = 'pcard' + (i === game.current ? ' current' : '');
      var av = '<span class="avatar" style="background:' + p.color + ';width:26px;height:26px;font-size:12px">' + initials(p.name) + '</span>';
      var mini = p.isAI ? '<span class="mini">AI</span>' : '';
      b.innerHTML = av + '<span class="nm">' + escapeHtml(p.name) + '</span>' + mini + '<span class="tt">' + G.playerTotal(p) + '</span>';
      b.onclick = function () { openPeek(i); };
      box.appendChild(b);
    });
  }

  // ---- peek ----
  function openPeek(i) {
    var p = game.players[i];
    $('peekTitle').textContent = p.name;
    var html = '';
    G.CATEGORIES.forEach(function (c) {
      var filled = G.isCategoryFilled(p, c.key);
      html += '<div class="peekrow' + (filled ? '' : ' empty') + '">'
        + '<span>' + c.label + '</span>'
        + '<span class="pv">' + (filled ? p.scores[c.key] : '–') + '</span></div>';
    });
    $('peekBody').innerHTML = html;
    $('peekTotal').textContent = G.playerTotal(p);
    $('peekModal').classList.remove('hidden');
  }
  $('peekClose').onclick = function () { $('peekModal').classList.add('hidden'); };
  $('peekModal').onclick = function (e) { if (e.target === $('peekModal')) $('peekModal').classList.add('hidden'); };

  // ---- game over ----
  function showGameOver() {
    var r = G.ranking(game);
    $('winner').innerHTML = '<span class="avatar" style="background:' + r[0].player.color + '">' + initials(r[0].player.name) + '</span>'
      + escapeHtml(r[0].player.name) + ' — ' + r[0].total + ' т.';
    $('ranks').innerHTML = r.map(function (x, idx) {
      return '<div class="rank' + (idx === 0 ? ' first' : '') + '"><span class="pos">' + (idx + 1) + '</span>'
        + '<span class="avatar" style="background:' + x.player.color + ';width:26px;height:26px;font-size:12px">' + initials(x.player.name) + '</span>'
        + '<span class="nm">' + escapeHtml(x.player.name) + '</span><span class="tt">' + x.total + '</span></div>';
    }).join('');
    $('overModal').classList.remove('hidden');
  }
  $('playAgain').onclick = function () {
    $('overModal').classList.add('hidden');
    $('game').classList.add('hidden');
    $('setup').classList.remove('hidden');
  };

  // ---- AI autoplay ----
  function runAiTurn() {
    aiBusy = true;
    renderTop();
    setTimeout(aiStep, AI_DELAY);
  }
  function aiStep() {
    if (rollsLeft() > 0) {
      if (rollsUsed > 0) holds = G.aiChooseHolds(dice);
      doRoll();
      // decide whether to keep rolling: keep going while rolls remain
      if (rollsLeft() > 0) {
        holds = G.aiChooseHolds(dice);
        renderDice();
        setTimeout(aiStep, AI_DELAY);
        return;
      }
    }
    setTimeout(aiFinish, AI_DELAY);
  }
  function aiFinish() {
    var p = G.currentPlayer(game);
    var choice = G.aiChooseCategory(p, dice);
    G.assignScore(p, choice.category, dice, choice.value);
    aiBusy = false;
    advance();
  }
})();
</script>
</body>
</html>
